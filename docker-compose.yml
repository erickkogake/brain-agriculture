version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: brain_agriculture_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: brain_agriculture
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - brain_network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: brain_agriculture_api
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: brain_agriculture
      LOG_LEVEL: warn
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - brain_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: brain_agriculture_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - postgres
    networks:
      - brain_network

networks:
  brain_network:
    driver: bridge

volumes:
  postgres_data: